# ============================================
# MacNotes Application Configuration
# ============================================
# Default Development Profile
# ============================================

# Application Name
spring.application.name=backend

# ============================================
# Database Configuration (PostgreSQL)
# ============================================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5440/postgres}
spring.datasource.username=umerqureshi
spring.datasource.password=
# spring.datasource.driver-class-name=org.postgresql.Driver   # optional

# ============================================
# JPA/Hibernate Configuration
# ============================================
spring.jpa.hibernate.ddl-auto=create-drop
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
#spring.jpa.show-sql=false
#spring.jpa.properties.hibernate.format_sql=true

# ============================================
# File Upload Configuration
# ============================================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ============================================
# Server Configuration
# ============================================
#server.port=8080
